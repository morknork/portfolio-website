<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="20 0 640 392" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<title>Forward auth request flow with single sign-on</title>
<desc>A user request hits Caddy, the reverse proxy, which checks authentik whether the request is authenticated. If not, the request passes through the authentik login page, where the user is authenticated or rejected, then back to Caddy. Once authenticated, the session grants access to multiple services behind the proxy, which is single sign-on.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="30" y="170" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="85" y="192" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Request</text>

<line x1="140" y1="192" x2="176" y2="192" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="176" y="164" width="150" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="251" y="182" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Caddy</text>
<text x="251" y="202" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Reverse proxy, the gate</text>

<line x1="326" y1="192" x2="362" y2="192" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="362" y="164" width="150" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="437" y="182" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">authentik check</text>
<text x="437" y="202" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Authenticated?</text>

<text x="446" y="250" text-anchor="start" font-size="12" fill="#5F5E5A">No</text>
<path d="M437 220 L437 322 L328 322" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="176" y="300" width="150" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="251" y="318" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">Login page</text>
<text x="251" y="338" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">authn + authz, or rejected</text>

<path d="M223 300 L223 220" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="190" y="262" text-anchor="end" font-size="12" fill="#5F5E5A">logs in</text>

<text x="447" y="150" text-anchor="start" font-size="12" fill="#5F5E5A">Yes, session grants access</text>
<path d="M512 180 L548 180 L548 70 L584 70" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M512 192 L584 192" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M512 204 L548 204 L548 314 L584 314" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="584" y="48" width="76" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="622" y="70" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Jellyfin</text>

<rect x="584" y="170" width="76" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="622" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Radarr</text>

<rect x="584" y="292" width="76" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="622" y="314" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">AdGuard</text>

<text x="340" y="378" text-anchor="middle" font-size="12" fill="#5F5E5A">One login, many services (SSO)</text>
</svg>
